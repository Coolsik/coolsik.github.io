<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="프로페셔널 포트폴리오와 웹 게임을 소개하는 개인 웹사이트입니다.">
    <title>Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <nav class="nav-shell" aria-label="주요 메뉴">
        <a class="brand" href="#home" aria-label="홈으로 이동">Portfolio</a>
        <button
          class="nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="primary-menu"
        >
          <span class="sr-only">메뉴 열기</span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </button>
        <ul class="nav-menu" id="primary-menu">
          <li><a href="#home">Home</a></li>
          <li><a href="#about">About</a></li>
          <li><a href="#games">Games</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="hero" id="home" aria-labelledby="hero-title">
        <div class="content-shell">
          <p class="eyebrow">Professional Portfolio</p>
          <h1 id="hero-title">더 나은 경험을 만드는 작업을 소개합니다.</h1>
          <p class="hero-copy">프로필과 프로젝트 내용은 확인 후 순차적으로 업데이트됩니다.</p>
          <a class="primary-link" href="#games">Games 살펴보기</a>
        </div>
      </section>

      <section class="section" id="about" aria-labelledby="about-title">
        <div class="content-shell card">
          <p class="eyebrow">About</p>
          <h2 id="about-title">프로필을 준비하고 있습니다.</h2>
          <p>확인된 경력과 프로젝트만 이곳에 소개할 예정입니다.</p>
        </div>
      </section>

      <section class="section section-accent" id="games" aria-labelledby="games-title">
        <div class="content-shell card game-preview">
          <div>
            <p class="eyebrow">Games</p>
            <h2 id="games-title">지렁이 게임 준비 영역</h2>
            <p>키보드와 모바일 터치로 즐기는 전체 게임은 아직 구현되지 않았습니다.</p>
          </div>
          <span class="status-badge">Coming soon</span>
        </div>
      </section>
    </main>

    <footer>
      <div class="content-shell">
        <p>Portfolio · 콘텐츠 준비 중</p>
      </div>
    </footer>
  </body>
</html>
